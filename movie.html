<!-- Movie player using YouTube -->
<div class="video-container">
  <iframe 
    src="https://www.youtube.com/embed/VIDEO_ID?autoplay=1&controls=1"
    frameborder="0"
    allowfullscreen
    allow="autoplay; encrypted-media"
  ></iframe>
</div>

<style>
  /* Make video responsive */
  .video-container {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 ratio */
    height: 0;
    overflow: hidden;
    border-radius: 10px;
  }
  
  .video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
</style>
